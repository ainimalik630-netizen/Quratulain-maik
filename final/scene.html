<div style="margin:0; background:#d8b4f8; height:100vh; position:relative; overflow:hidden;">

  <!-- Sun -->
  <div style="width:100px; height:100px; background:orange; border-radius:50%; position:absolute; top:50px; left:50px;"></div>

  <!-- Grass -->
  <div style="width:100%; height:200px; background:darkgreen; position:absolute; bottom:0;"></div>

  <!-- Roof -->
  <div style="
    width:0;
    height:0;
    border-left:75px solid transparent;
    border-right:75px solid transparent;
    border-bottom:80px solid purple;
    position:absolute;
    bottom:350px;
    left:50%;
    transform:translateX(-50%);
  "></div>

  <!-- House -->
  <div style="width:150px; height:150px; background:blue; position:absolute; bottom:200px; left:50%; transform:translateX(-50%);"></div>

  <!-- Door -->
  <div style="width:40px; height:70px; background:black; position:absolute; bottom:200px; left:50%; transform:translateX(-50%);"></div>

  <!-- Windows -->
  <div style="width:30px; height:30px; background:white; position:absolute; bottom:280px; left:calc(50% - 60px);"></div>
  <div style="width:30px; height:30px; background:white; position:absolute; bottom:280px; left:calc(50% + 30px);"></div>

</div>
